<script>

const STORAGE_KEY = "wellness_hub_v4";
const TODAY = new Date().toISOString().split("T")[0];

const defaultState = {
  date: TODAY, foods: [], water: 0, steps: 0, stepHistory: [],
  habits: {water:false, devotion:false, sleep:0, bedtime:"", wakeTime:""},
  goals: {calories:2000, water:2500, steps:10000, sleep:8, protein:150, monthlySteps:300000},

  cycle:{periodDates:[], ovulationDates:[], symptoms:{}, avgCycleLength:28, avgPeriodDuration:5}
};

function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return defaultState;
    const s = JSON.parse(raw);
    if(s.date !== TODAY) return {...defaultState,...s,date:TODAY,foods:[],water:0,steps:0,habits:{water:false,devotion:false,sleep:0,bedtime:"",wakeTime:""}};
    return {...defaultState,...s};
  }catch{return defaultState;}
}

async function callAI(prompt){
  const r = await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content:prompt}]})
  });
  const d = await r.json();
  return d.content.map(b=>b.text||"").join("");
}

function smartToGrams(qty,unit,food){
  if(unit==="g"||unit==="ml") return qty;
  if(unit==="kg") return qty*1000;
  if(unit==="l") return qty*1000;
  if(unit==="oz") return qty*28.35;
  if(unit==="lb") return qty*453.6;
  if(unit==="tbsp") return qty*15;
  if(unit==="tsp") return qty*5;
  if(unit==="cup") return qty*(food&&food.cupG||240);
  return qty*(food&&food.itemG||100);
}

function searchLocalDB(query){
  const q = query.toLowerCase().trim();
  const words = q.split(/\s+/).filter(w=>w.length>1);
  const scored = FOOD_DB.map(food=>{
    const name = food.name.toLowerCase();
    let score=0;
    words.forEach(w=>{if(name.startsWith(w))score+=3;else if(name.includes(w))score+=1;});
    return {food,score};
  }).filter(x=>x.score>0).sort((a,b)=>b.score-a.score);
  return scored.slice(0,6).map(x=>x.food);
}

// UI Primitives
function Card({children,style}){
  return html`<div style=${{background:"var(--color-background-primary,#fff)",border:"0.5px solid rgba(0,0,0,0.1)",borderRadius:12,padding:"14px 18px",marginBottom:12,...style}}>${children}</div>`;
}
function CT({icon,children}){
  return html`<p style=${{fontSize:15,fontWeight:500,display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
    <i class=${"ti "+icon} aria-hidden="true"></i>${children}</p>`;
}
function Btn({children,onClick,primary,danger,small,style,disabled}){
  const s={padding:small?"5px 10px":"8px 14px",borderRadius:8,
    border:danger?"0.5px solid #F7C1C1":"0.5px solid rgba(0,0,0,0.2)",
    background:primary?"var(--color-text-primary,#1a1a1a)":"var(--color-background-primary,#fff)",
    color:primary?"var(--color-background-primary,#fff)":danger?"#A32D2D":"var(--color-text-primary,#1a1a1a)",
    fontSize:small?12:14,cursor:disabled?"default":"pointer",opacity:disabled?0.5:1,
    display:"inline-flex",alignItems:"center",gap:5,whiteSpace:"nowrap",flexShrink:0,...style};
  return html`<button onClick=${onClick} disabled=${disabled} style=${s}>${children}</button>`;
}
function Inp({value,onChange,type="text",placeholder,style,onKeyDown,min,max,step}){
  const s={padding:"8px 10px",borderRadius:8,border:"0.5px solid rgba(0,0,0,0.2)",
    fontSize:14,background:"var(--color-background-primary,#fff)",
    color:"var(--color-text-primary,#1a1a1a)",width:"100%",...style};
  return html`<input value=${value} onChange=${onChange} type=${type} placeholder=${placeholder}
    onKeyDown=${onKeyDown} min=${min} max=${max} step=${step} style=${s}/>`;
}
function Sel({value,onChange,children,style}){
  const s={padding:"8px 10px",borderRadius:8,border:"0.5px solid rgba(0,0,0,0.2)",
    fontSize:14,background:"var(--color-background-primary,#fff)",
    color:"var(--color-text-primary,#1a1a1a)",...style};
  return html`<select value=${value} onChange=${onChange} style=${s}>${children}</select>`;
}
function PBar({value,max,color="#1D9E75"}){
  const pct=Math.min(100,max>0?Math.round(value/max*100):0);
  return html`<div style=${{height:8,background:"#eee",borderRadius:4,overflow:"hidden",marginTop:4}}>
    <div style=${{height:"100%",width:pct+"%",background:color,borderRadius:4,transition:"width 0.3s"}}></div>
  </div>`;
}
function MCard({label,value,unit,color}){
  return html`<div style=${{background:"#f8f8f5",borderRadius:8,padding:"12px 14px"}}>
    <p style=${{fontSize:12,color:"#666",marginBottom:2}}>${label}</p>
    <p style=${{fontSize:19,fontWeight:500,color:color||"var(--color-text-primary,#1a1a1a)"}}>${value}</p>
    <p style=${{fontSize:12,color:"#666"}}>${unit}</p>
  </div>`;
}
function Toggle({on,onClick}){
  return html`<button onClick=${onClick} style=${{width:40,height:22,borderRadius:11,
    background:on?"#1D9E75":"#ddd",border:"none",cursor:"pointer",position:"relative",
    transition:"background 0.2s",flexShrink:0}}>
    <span style=${{position:"absolute",top:3,left:3,width:16,height:16,borderRadius:"50%",
      background:"#fff",transition:"transform 0.2s",transform:on?"translateX(18px)":"none",display:"block"}}></span>
  </button>`;
}
function Tag({children,color="green"}){
  const c={green:["#EAF3DE","#3B6D11"],amber:["#FAEEDA","#854F0B"],blue:["#E6F1FB","#185FA5"],
    pink:["#FBEAF0","#993556"],purple:["#EEEDFE","#534AB7"],teal:["#E1F5EE","#0F6E56"],red:["#FCEBEB","#A32D2D"]};
  const [bg,text]=(c[color]||c.green);
  return html`<span style=${{background:bg,color:text,fontSize:11,fontWeight:500,padding:"2px 8px",borderRadius:10}}>${children}</span>`;
}
function AIBox({text,loading}){
  if(!text&&!loading) return null;
  return html`<div style=${{background:"#f8f8f5",borderRadius:8,padding:"10px 12px",marginTop:8,
    fontSize:13,lineHeight:1.6,color:"#555",whiteSpace:"pre-wrap"}}>${loading?"Thinking...":text}</div>`;
}
function Chip({label,active,onClick}){
  return html`<button onClick=${onClick} style=${{padding:"5px 12px",borderRadius:20,
    border:"0.5px solid "+(active?"var(--color-text-primary,#1a1a1a)":"rgba(0,0,0,0.2)"),
    background:active?"var(--color-text-primary,#1a1a1a)":"var(--color-background-primary,#fff)",
    color:active?"var(--color-background-primary,#fff)":"#666",
    fontSize:13,cursor:"pointer",whiteSpace:"nowrap"}}>${label}</button>`;
}

// ── NUTRITION ──────────────────────────────────────────────────────────────────
function NutritionTab({state,setState}){
  const [query,setQuery]=useState("");
  const [results,setResults]=useState([]);
  const [searching,setSearching]=useState(false);
  const [aiText,setAiText]=useState("");
  const [aiLoading,setAiLoading]=useState(false);
  const [aiFood,setAiFood]=useState(null);
  const [servingQty,setServingQty]=useState({});
  const [servingUnit,setServingUnit]=useState({});
  const [manName,setManName]=useState("");
  const [manQty,setManQty]=useState("");
  const [manUnit,setManUnit]=useState("g");
  const [manCals,setManCals]=useState("");
  const [manProt,setManProt]=useState("");
  const [manCarbs,setManCarbs]=useState("");
  const [manFat,setManFat]=useState("");
  const [manFibre,setManFibre]=useState("");
  const [waterInput,setWaterInput]=useState("");

  const totalCals=state.foods.reduce((s,f)=>s+(f.calories||0),0);
  const totalProt=state.foods.reduce((s,f)=>s+(f.protein||0),0);
  const totalCarbs=state.foods.reduce((s,f)=>s+(f.carbs||0),0);
  const totalFat=state.foods.reduce((s,f)=>s+(f.fat||0),0);
  const totalFibre=state.foods.reduce((s,f)=>s+(f.fibre||0),0);
  const protCals=totalProt*4,carbCals=totalCarbs*4,fatCals=totalFat*9;
  const totalMacroCals=protCals+carbCals+fatCals||1;
  const protSplit=Math.round(protCals/totalMacroCals*100);
  const carbSplit=Math.round(carbCals/totalMacroCals*100);
  const fatSplit=Math.round(fatCals/totalMacroCals*100);

  async function doSearch(){
    if(!query.trim()) return;
    setSearching(true);setResults([]);setAiText("");setAiFood(null);
    const local=searchLocalDB(query);
    if(local.length){
      setResults(local.map(f=>({...f,fromDB:true})));
      const u={},q={};
      local.forEach(f=>{u[f.name]=f.itemG?"item":"g";q[f.name]=f.itemG?"1":"100";});
      setServingUnit(u);setServingQty(q);
    } else {
      setAiLoading(true);
      try{
        const r=await callAI(`You are a nutrition database. Per 100g for "${query}": 1 sentence description. End with: CALORIES:[n] PROTEIN:[n] CARBS:[n] FAT:[n]`);
        const parse=k=>{const m=r.match(new RegExp(k+":[\\d.]+","i"));return m?parseFloat(m[0].split(":")[1]):0;};
        setAiText(r.replace(/CALORIES:[\d.]+/ig,"").replace(/PROTEIN:[\d.]+/ig,"").replace(/CARBS:[\d.]+/ig,"").replace(/FAT:[\d.]+/ig,"").trim());
        setAiFood({name:query,calories:Math.round(parse("CALORIES")),protein:Math.round(parse("PROTEIN")*10)/10,carbs:Math.round(parse("CARBS")*10)/10,fat:Math.round(parse("FAT")*10)/10,qty:"100g"});
      }catch{setAiText("Not found. Try manual entry below.");}
      setAiLoading(false);
    }
    setSearching(false);
  }

  function addFromDB(p){
    const key=p.fromDB?p.name:p.product_name;
    const rawQty=parseFloat(servingQty[key]||"100")||100;
    const unit=servingUnit[key]||"g";
    const grams=smartToGrams(rawQty,unit,p.fromDB?p:null);
    const factor=grams/100;
    const food=p.fromDB?{
      name:p.name,calories:Math.round(p.cal*factor),protein:Math.round(p.pro*factor*10)/10,
      carbs:Math.round(p.carb*factor*10)/10,fat:Math.round(p.fat*factor*10)/10,
      serving:(unit==="item"&&p.note)?p.note:`${rawQty} ${unit}`
    }:{
      name:p.product_name+(p.brands?` (${p.brands})`:""),
      calories:Math.round((p.nutriments["energy-kcal_100g"]||p.nutriments["energy-kcal"]||0)*factor),
      protein:Math.round((p.nutriments.proteins_100g||0)*factor*10)/10,
      carbs:Math.round((p.nutriments.carbohydrates_100g||0)*factor*10)/10,
      fat:Math.round((p.nutriments.fat_100g||0)*factor*10)/10,serving:`${rawQty} ${unit}`
    };
    setState(s=>({...s,foods:[...s.foods,food]}));
    setResults([]);setQuery("");
  }

  function addManual(){
    if(!manName.trim()) return;
    setState(s=>({...s,foods:[...s.foods,{name:manName,calories:parseInt(manCals)||0,
      protein:parseFloat(manProt)||0,carbs:parseFloat(manCarbs)||0,fat:parseFloat(manFat)||0,
      fibre:parseFloat(manFibre)||0,serving:`${manQty} ${manUnit}`}]}));
    setManName("");setManQty("");setManCals("");setManProt("");setManCarbs("");setManFat("");setManFibre("");
  }

  function addWater(ml){setState(s=>({...s,water:s.water+ml}));}
  function addWaterCustom(){const v=parseInt(waterInput)||0;if(v>0){addWater(v);setWaterInput("");}}

  return html`<div>
    <${Card}>
      <p style=${{fontSize:15,fontWeight:500,marginBottom:6}}>Calories</p>
      <div style=${{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:4}}>
        <span style=${{fontSize:24,fontWeight:600,color:"#D85A30"}}>${totalCals}</span>
        <span style=${{fontSize:13,color:"#666"}}>/ ${state.goals.calories} kcal</span>
      </div>
      <${PBar} value=${totalCals} max=${state.goals.calories} color="#D85A30"/>
      <p style=${{fontSize:11,color:"#666",marginTop:3}}>${state.goals.calories-totalCals>0?`${state.goals.calories-totalCals} kcal remaining`:`${totalCals-state.goals.calories} kcal over goal`}</p>
    <//>
    <${Card}>
      <${CT} icon="ti-chart-pie">Macros Breakdown<//>
      ${totalMacroCals>1&&html`<div style=${{display:"flex",height:10,borderRadius:5,overflow:"hidden",marginBottom:10,gap:2}}>
        <div style=${{width:protSplit+"%",background:"#534AB7",borderRadius:"5px 0 0 5px"}}></div>
        <div style=${{width:carbSplit+"%",background:"#BA7517"}}></div>
        <div style=${{width:fatSplit+"%",background:"#1D9E75",borderRadius:"0 5px 5px 0"}}></div>
      </div>`}
      ${[{label:"Protein",value:totalProt,goal:state.goals.protein||150,unit:"g",color:"#534AB7",split:protSplit},
         {label:"Carbs",value:totalCarbs,goal:null,unit:"g",color:"#BA7517",split:carbSplit},
         {label:"Fat",value:totalFat,goal:null,unit:"g",color:"#1D9E75",split:fatSplit},
         {label:"Fibre",value:totalFibre,goal:25,unit:"g",color:"#0F6E56",split:null}
      ].map(m=>html`<div key=${m.label} style=${{marginBottom:10}}>
        <div style=${{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:2}}>
          <span style=${{display:"flex",alignItems:"center",gap:6}}>
            <span style=${{width:10,height:10,borderRadius:"50%",background:m.color,display:"inline-block"}}></span>
            ${m.label}${m.split!==null?html` <span style=${{fontSize:11,color:"#666"}}>(${m.split}%)</span>`:""}
          </span>
          <span style=${{color:"#666"}}><strong style=${{color:m.color}}>${m.value.toFixed(1)}${m.unit}</strong>${m.goal?` / ${m.goal}${m.unit} goal`:""}</span>
        </div>
        ${m.goal?html`<${PBar} value=${m.value} max=${m.goal} color=${m.color}/>`
          :html`<div style=${{height:6,background:m.color,borderRadius:3,opacity:0.25,marginTop:4}}></div>`}
      </div>`)}
    <//>
    <${Card}>
      <${CT} icon="ti-search">Search Food Database<//>
      <p style=${{fontSize:12,color:"#666",marginBottom:8}}>Local database of 400+ foods including Kenyan & African staples. AI fallback if not found.</p>
      <div style=${{display:"flex",gap:8,marginBottom:8}}>
        <${Inp} value=${query} onChange=${e=>setQuery(e.target.value)} placeholder="e.g. ugali, chapati, chicken breast, avocado..." onKeyDown=${e=>e.key==="Enter"&&doSearch()}/>
        <${Btn} onClick=${doSearch} primary=${true} disabled=${searching}>${searching?"...":"Search"}<//>
      </div>
      ${results.map((p,i)=>{
        const isLocal=p.fromDB;
        const key=isLocal?p.name:p.product_name;
        const kcal=isLocal?p.cal:Math.round(p.nutriments?.["energy-kcal_100g"]||p.nutriments?.["energy-kcal"]||0);
        const qty=servingQty[key]!==undefined?servingQty[key]:(isLocal&&p.itemG?"1":"100");
        const unit=servingUnit[key]!==undefined?servingUnit[key]:(isLocal&&p.itemG?"item":"g");
        const estCals=Math.round(kcal*smartToGrams(parseFloat(qty)||100,unit,isLocal?p:null)/100);
        return html`<div key=${i} style=${{padding:"10px 0",borderBottom:"0.5px solid rgba(0,0,0,0.08)"}}>
          <div style=${{display:"flex",justifyContent:"space-between",marginBottom:4}}>
            <p style=${{fontSize:14,fontWeight:500}}>${key}</p>
            ${isLocal&&html`<span style=${{fontSize:11,background:"#EAF3DE",color:"#3B6D11",padding:"1px 6px",borderRadius:8}}>Verified</span>`}
          </div>
          <p style=${{fontSize:12,color:"#666",marginBottom:6}}>${kcal} kcal \u00b7 ${isLocal?p.pro:(p.nutriments?.proteins_100g||0).toFixed(1)}g protein per 100g</p>
          ${isLocal&&p.note&&html`<p style=${{fontSize:11,color:"#534AB7",marginBottom:6}}>${p.note}</p>`}
          <div style=${{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
            <${Inp} type="number" value=${qty} onChange=${e=>setServingQty(q=>({...q,[key]:e.target.value}))} placeholder="Qty" style=${{width:60}}/>
            <${Sel} value=${unit} onChange=${e=>setServingUnit(u=>({...u,[key]:e.target.value}))} style=${{flex:1,minWidth:120}}>
              ${UNIT_OPTIONS.map(o=>html`<option key=${o.value} value=${o.value}>${o.label}</option>`)}
            <//>
            <span style=${{fontSize:13,color:"#D85A30",fontWeight:600}}>${estCals} kcal</span>
            <${Btn} onClick=${()=>addFromDB(p)} primary=${true} small=${true}>+ Add<//>
          </div>
        </div>`;
      })}
      ${(aiText||aiLoading)&&html`<div>
        <p style=${{fontSize:12,color:"#666",marginTop:8}}>AI estimate (per 100g):</p>
        <${AIBox} text=${aiText} loading=${aiLoading}/>
        ${aiFood&&!aiLoading&&html`<${Btn} onClick=${()=>{setState(s=>({...s,foods:[...s.foods,aiFood]}));setQuery("");setAiText("");setAiFood(null);}} primary=${true} style=${{marginTop:8}}>+ Add AI estimate (${aiFood.calories} kcal)<//>`}
      </div>`}
    <//>
    <${Card}>
      <${CT} icon="ti-pencil">Manual Entry<//>
      <div style=${{display:"flex",flexWrap:"wrap",gap:8,marginBottom:8}}>
        <${Inp} value=${manName} onChange=${e=>setManName(e.target.value)} placeholder="Food name" style=${{flex:"2 1 140px"}}/>
        <${Inp} value=${manQty} onChange=${e=>setManQty(e.target.value)} type="number" placeholder="Qty" style=${{flex:"0 0 60px"}}/>
        <${Sel} value=${manUnit} onChange=${e=>setManUnit(e.target.value)} style=${{flex:"1 1 110px"}}>
          ${UNIT_OPTIONS.map(o=>html`<option key=${o.value} value=${o.value}>${o.label}</option>`)}
        <//>
      </div>
      <div style=${{display:"flex",flexWrap:"wrap",gap:8,marginBottom:8}}>
        <${Inp} value=${manCals} onChange=${e=>setManCals(e.target.value)} type="number" placeholder="kcal" style=${{flex:"1 1 60px"}}/>
        <${Inp} value=${manProt} onChange=${e=>setManProt(e.target.value)} type="number" placeholder="protein g" style=${{flex:"1 1 60px"}}/>
        <${Inp} value=${manCarbs} onChange=${e=>setManCarbs(e.target.value)} type="number" placeholder="carbs g" style=${{flex:"1 1 60px"}}/>
        <${Inp} value=${manFat} onChange=${e=>setManFat(e.target.value)} type="number" placeholder="fat g" style=${{flex:"1 1 60px"}}/>
        <${Inp} value=${manFibre} onChange=${e=>setManFibre(e.target.value)} type="number" placeholder="fibre g" style=${{flex:"1 1 60px"}}/>
        <${Btn} onClick=${addManual} primary=${true}>+ Add<//>
      </div>
    <//>
    <${Card}>
      <${CT} icon="ti-droplet">Water Intake<//>
      <div style=${{display:"flex",gap:8,marginBottom:10,flexWrap:"wrap"}}>
        <${Inp} value=${waterInput} onChange=${e=>setWaterInput(e.target.value)} type="number" placeholder="ml" style=${{flex:"1 1 80px"}}/>
        <${Btn} onClick=${()=>addWater(250)}>+250ml<//>
        <${Btn} onClick=${()=>addWater(500)}>+500ml<//>
        <${Btn} onClick=${()=>addWater(750)}>+750ml<//>
        <${Btn} onClick=${addWaterCustom} primary=${true}>+<//> 
      </div>
      <${PBar} value=${state.water} max=${state.goals.water} color="#1D9E75"/>
      <p style=${{fontSize:12,color:"#666",marginTop:4}}>${state.water.toLocaleString()} / ${state.goals.water.toLocaleString()} ml</p>
    <//>
    <${Card}>
      <${CT} icon="ti-list">Today's Food Log<//>
      ${!state.foods.length?html`<p style=${{fontSize:13,color:"#666"}}>Nothing logged yet.</p>`:
        state.foods.map((f,i)=>html`<div key=${i} style=${{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"8px 0",borderBottom:i<state.foods.length-1?"0.5px solid rgba(0,0,0,0.08)":"none"}}>
          <div>
            <p style=${{fontSize:14,fontWeight:500}}>${f.name}</p>
            <p style=${{fontSize:12,color:"#666"}}>${f.serving?f.serving+' \u00b7 ':''} ${f.calories} kcal \u00b7 ${f.protein}g P \u00b7 ${f.carbs}g C \u00b7 ${f.fat}g F${f.fibre?` \u00b7 ${f.fibre}g fibre`:''}</p>
          </div>
          <${Btn} onClick=${()=>setState(s=>({...s,foods:s.foods.filter((_,j)=>j!==i)}))} danger=${true} small=${true}>x<//>
        </div>`)}
    <//>
  </div>`;
}

// ── WORKOUTS ───────────────────────────────────────────────────────────────────
function WorkoutsTab({state,setState}){
  const [view,setView]=useState("programs");
  const [exSearch,setExSearch]=useState("");const [exResult,setExResult]=useState("");const [exLoading,setExLoading]=useState(false);
  const [progName,setProgName]=useState("");const [activeProg,setActiveProg]=useState(null);
  const [exName,setExName]=useState("");const [exSets,setExSets]=useState("");
  const [sessionProg,setSessionProg]=useState(null);const [sessionSets,setSessionSets]=useState({});const [sessionNotes,setSessionNotes]=useState("");
  const [histFilter,setHistFilter]=useState(null);
  const [selAreas,setSelAreas]=useState([]);const [fitLevel,setFitLevel]=useState("intermediate");const [equipment,setEquipment]=useState("gym");
  const [suggestResult,setSuggestResult]=useState("");const [suggestLoading,setSuggestLoading]=useState(false);

  async function searchEx(){
    if(!exSearch.trim())return;setExLoading(true);setExResult("");
    try{const r=await callAI(`Fitness coach. Describe "${exSearch}": muscles worked, 2-3 form tips, common mistake. 4-5 sentences.`);setExResult(r);}
    catch{setExResult("Could not fetch.");}setExLoading(false);
  }
  async function getSuggestions(){
    if(!selAreas.length)return;setSuggestLoading(true);setSuggestResult("");
    const areas=selAreas.map(id=>BODY_AREAS.find(a=>a.id===id)?.label).join(", ");
    try{const r=await callAI(`Personal trainer. Workout targeting: ${areas}. Level: ${fitLevel}. Equipment: ${equipment==="gym"?"full gym":equipment==="home"?"bodyweight":"bands/dumbbells"}. Give 6-8 exercises with sets, reps and brief notes.`);setSuggestResult(r);}
    catch{setSuggestResult("Could not generate.");}setSuggestLoading(false);
  }
  function createProg(){if(!progName.trim())return;const p={id:Date.now().toString(),name:progName,exercises:[]};setState(s=>({...s,programs:[...s.programs,p]}));setProgName("");setActiveProg(p.id);}
  function addEx(progId){if(!exName.trim())return;setState(s=>({...s,programs:s.programs.map(p=>p.id===progId?{...p,exercises:[...p.exercises,{name:exName,sets:exSets,ytQuery:encodeURIComponent(exName+" proper form tutorial")}]}:p)}));setExName("");setExSets("");}
  function startSession(prog){const init={};prog.exercises.forEach((_,i)=>{init[i]=[{reps:"",weight:""}];});setSessionProg(prog);setSessionSets(init);setSessionNotes("");setView("session");}
  function saveSession(){if(!sessionProg)return;const exercises=sessionProg.exercises.map((e,i)=>({name:e.name,sets:(sessionSets[i]||[]).filter(s=>s.reps||s.weight)}));setState(s=>({...s,workoutSessions:[...(s.workoutSessions||[]),{id:Date.now().toString(),date:TODAY,programName:sessionProg.name,programId:sessionProg.id,exercises,notes:sessionNotes}]}));setView("programs");setSessionProg(null);}
  function getPB(name){const all=[];(state.workoutSessions||[]).forEach(sess=>sess.exercises.forEach(ex=>{if(ex.name===name)ex.sets.forEach(s=>{if(s.weight)all.push({weight:parseFloat(s.weight),reps:parseInt(s.reps)||0,date:sess.date});});}));return all.length?all.reduce((b,s)=>s.weight>(b?.weight||0)?s:b,null):null;}

  const sessions=state.workoutSessions||[];

  if(view==="suggest") return html`<div>
    <div style=${{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
      <${Btn} onClick=${()=>setView("programs")}>Back<//>
      <p style=${{fontWeight:500,fontSize:15}}>Workout Suggestions</p>
    </div>
    <${Card}>

// ── STEPS ──────────────────────────────────────────────────────────────────────
function StepsTab({state,setState}){
  const [stepsInput,setStepsInput]=useState("");
  const [goalInput,setGoalInput]=useState("");
  const [monthlyGoalInput,setMonthlyGoalInput]=useState("");
  const [histView,setHistView]=useState("monthly");
  const stepHistory=state.stepHistory||[];
  const monthlyStepGoal=state.goals.monthlySteps||(state.goals.steps*30);

  function logSteps(){const v=parseInt(stepsInput)||0;if(!v)return;const newH=stepHistory.filter(h=>h.date!==TODAY);newH.push({date:TODAY,steps:v});setState(s=>({...s,steps:v,stepHistory:newH.slice(-365)}));setStepsInput("");}

  function getMonthlyData(){
    const bm={};
    stepHistory.forEach(h=>{const m=h.date.slice(0,7);if(!bm[m])bm[m]={total:0,days:0};bm[m].total+=h.steps;bm[m].days+=1;});
    return Object.entries(bm).sort((a,b)=>b[0]>a[0]?1:-1).slice(0,12);
  }
  function monthLabel(ym){const[y,m]=ym.split("-");return new Date(parseInt(y),parseInt(m)-1,1).toLocaleDateString("en-GB",{month:"short",year:"numeric"});}

  const monthlyData=getMonthlyData();
  const curMonth=TODAY.slice(0,7);
  const curEntry=monthlyData.find(([m])=>m===curMonth);
  const curTotal=curEntry?curEntry[1].total:state.steps;

  return html`<div>
    <div style=${{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(120px,1fr))",gap:8,marginBottom:12}}>
      <${MCard} label="Today" value=${state.steps.toLocaleString()} unit="steps" color="#534AB7"/>
      <${MCard} label="Daily goal" value=${state.goals.steps.toLocaleString()} unit="steps"/>
      <${MCard} label="This month" value=${curTotal.toLocaleString()} unit=${"/ "+monthlyStepGoal.toLocaleString()} color="#1D9E75"/>
      <${MCard} label="Burned today" value=${Math.round(state.steps*0.04)} unit="kcal est." color="#D85A30"/>
    </div>
    <${Card}>
      <${CT} icon="ti-shoe">Log Steps<//>
      <div style=${{display:"flex",gap:8,marginBottom:10}}>
        <${Inp} value=${stepsInput} onChange=${e=>setStepsInput(e.target.value)} type="number" placeholder="Number of steps"/>
        <${Btn} onClick=${logSteps} primary=${true}>Log<//>
      </div>
      <${PBar} value=${state.steps} max=${state.goals.steps} color="#534AB7"/>
      <p style=${{fontSize:12,color:"#666",marginTop:4}}>${state.steps.toLocaleString()} / ${state.goals.steps.toLocaleString()} today</p>
      <div style=${{marginTop:10}}>
        <${PBar} value=${curTotal} max=${monthlyStepGoal} color="#1D9E75"/>
        <p style=${{fontSize:12,color:"#666",marginTop:4}}>${curTotal.toLocaleString()} / ${monthlyStepGoal.toLocaleString()} this month</p>
      </div>
    <//>
    <${Card}>
      <${CT} icon="ti-settings">Step Goals<//>
      <div style=${{display:"flex",flexWrap:"wrap",gap:10}}>
        <div style=${{flex:"1 1 130px"}}>
          <p style=${{fontSize:12,color:"#666",marginBottom:4}}>Daily goal</p>
          <div style=${{display:"flex",gap:8}}>
            <${Inp} value=${goalInput} onChange=${e=>setGoalInput(e.target.value)} type="number" placeholder=${state.goals.steps.toLocaleString()}/>
            <${Btn} onClick=${()=>{setState(s=>({...s,goals:{...s.goals,steps:parseInt(goalInput)||s.goals.steps}}));setGoalInput("");}}>Save<//>
          </div>
        </div>
        <div style=${{flex:"1 1 130px"}}>
          <p style=${{fontSize:12,color:"#666",marginBottom:4}}>Monthly goal</p>
          <div style=${{display:"flex",gap:8}}>
            <${Inp} value=${monthlyGoalInput} onChange=${e=>setMonthlyGoalInput(e.target.value)} type="number" placeholder=${monthlyStepGoal.toLocaleString()}/>
            <${Btn} onClick=${()=>{setState(s=>({...s,goals:{...s.goals,monthlySteps:parseInt(monthlyGoalInput)||monthlyStepGoal}}));setMonthlyGoalInput("");}}>Save<//>
          </div>
        </div>
      </div>
    <//>
    <${Card}>
      <${CT} icon="ti-chart-line">Step History<//>
      <div style=${{display:"flex",gap:6,marginBottom:12}}>
        <${Chip} label="Monthly" active=${histView==="monthly"} onClick=${()=>setHistView("monthly")}/>
        <${Chip} label="Daily (last 30)" active=${histView==="daily"} onClick=${()=>setHistView("daily")}/>
      </div>
      ${histView==="monthly"&&(!monthlyData.length?html`<p style=${{fontSize:13,color:"#666"}}>No history yet.</p>`:
        monthlyData.map(([month,data],i)=>html`<div key=${i} style=${{marginBottom:12}}>
          <div style=${{display:"flex",justifyContent:"space-between",fontSize:12,color:"#666",marginBottom:2}}>
            <span style=${{fontWeight:500}}>${monthLabel(month)}</span>
            <span>${data.total.toLocaleString()} steps - ${data.days} days - avg ${Math.round(data.total/data.days).toLocaleString()}/day</span>
          </div>
          <${PBar} value=${data.total} max=${monthlyStepGoal} color="#534AB7"/>
          <p style=${{fontSize:11,color:"#666",marginTop:2}}>${Math.round(data.total/monthlyStepGoal*100)}% of monthly goal</p>
        </div>`))}
      ${histView==="daily"&&(!stepHistory.length?html`<p style=${{fontSize:13,color:"#666"}}>No history yet.</p>`:
        [...stepHistory].reverse().slice(0,30).map((h,i)=>html`<div key=${i} style=${{marginBottom:10}}>
          <div style=${{display:"flex",justifyContent:"space-between",fontSize:12,color:"#666"}}><span>${h.date}</span><span>${h.steps.toLocaleString()} steps</span></div>
          <${PBar} value=${h.steps} max=${state.goals.steps} color="#534AB7"/>
        </div>`))}
    <//>
  </div>`;
}

// ── HABITS ─────────────────────────────────────────────────────────────────────
function HabitsTab({state,setState}){
  const [bedtime,setBedtime]=useState(state.habits.bedtime||"");
  const [wakeTime,setWakeTime]=useState(state.habits.wakeTime||"");
  const [aiText,setAiText]=useState("");const [aiLoading,setAiLoading]=useState(false);

  function calcSleepHrs(bed,wake){
    if(!bed||!wake)return null;
    const[bh,bm]=bed.split(":").map(Number);const[wh,wm]=wake.split(":").map(Number);
    let mins=(wh*60+wm)-(bh*60+bm);if(mins<0)mins+=24*60;return Math.round(mins/60*10)/10;
  }
  function logSleep(){
    const hrs=calcSleepHrs(bedtime,wakeTime);if(!hrs)return;
    setState(s=>({...s,habits:{...s.habits,sleep:hrs,bedtime,wakeTime}}));
  }
  const computedHrs=calcSleepHrs(bedtime,wakeTime);
  async function getInsights(){
    setAiLoading(true);setAiText("");
    try{const r=await callAI(`Wellness coach. Water:${state.water}ml (goal ${state.goals.water}ml), Sleep:${state.habits.sleep}hrs (goal ${state.goals.sleep}hrs), Devotion:${state.habits.devotion}. Give 3 warm personalised habit tips.`);setAiText(r);}
    catch{setAiText("Could not load.");}setAiLoading(false);
  }

  return html`<div>
    <${Card}>
      <${CT} icon="ti-checklist">Daily Habits<//>
      ${[{key:"water",icon:"ti-droplet",color:"#185FA5",label:"Water intake",sub:`${state.water} / ${state.goals.water} ml`,can:state.water>=state.goals.water},
         {key:"devotion",icon:"ti-book",color:"#3B6D11",label:"Daily devotion",sub:"Spiritual time today",can:true}
      ].map(h=>html`<div key=${h.key} style=${{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 0",borderBottom:"0.5px solid rgba(0,0,0,0.08)"}}>
        <div style=${{display:"flex",alignItems:"center",gap:10}}>
          <i class=${"ti "+h.icon} style=${{fontSize:18,color:h.color}} aria-hidden="true"></i>
          <div><p style=${{fontSize:14,fontWeight:500}}>${h.label}</p><p style=${{fontSize:12,color:"#666"}}>${h.sub}</p></div>
        </div>
        <${Toggle} on=${state.habits[h.key]} onClick=${()=>h.can&&setState(s=>({...s,habits:{...s.habits,[h.key]:!s.habits[h.key]}}))}/>
      </div>`)}
      <div style=${{padding:"10px 0"}}>
        <div style=${{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
          <i class="ti ti-moon" style=${{fontSize:18,color:"#534AB7"}} aria-hidden="true"></i>
          <div>
            <p style=${{fontSize:14,fontWeight:500}}>Sleep</p>
            <p style=${{fontSize:12,color:"#666"}}>${state.habits.sleep>0?`${state.habits.sleep} hrs${state.habits.bedtime?" - "+state.habits.bedtime+" to "+state.habits.wakeTime:""`}:"Not logged"}</p>
          </div>
        </div>
        <div style=${{display:"flex",flexWrap:"wrap",gap:8,alignItems:"flex-end"}}>
          <div style=${{flex:"1 1 110px"}}>
            <p style=${{fontSize:11,color:"#666",marginBottom:3}}>Bedtime</p>
            <input type="time" value=${bedtime} onChange=${e=>setBedtime(e.target.value)} style=${{width:"100%",padding:"7px 10px",borderRadius:8,border:"0.5px solid rgba(0,0,0,0.2)",fontSize:14}}/>
          </div>
          <div style=${{flex:"1 1 110px"}}>
            <p style=${{fontSize:11,color:"#666",marginBottom:3}}>Wake up</p>
            <input type="time" value=${wakeTime} onChange=${e=>setWakeTime(e.target.value)} style=${{width:"100%",padding:"7px 10px",borderRadius:8,border:"0.5px solid rgba(0,0,0,0.2)",fontSize:14}}/>
          </div>
          <div style=${{display:"flex",flexDirection:"column",gap:4}}>
            ${computedHrs!==null&&html`<p style=${{fontSize:12,color:"#534AB7",fontWeight:500}}>${computedHrs} hrs</p>`}
            <${Btn} onClick=${logSleep} primary=${true} small=${true} disabled=${!computedHrs}>Save<//>
          </div>
        </div>
        ${state.habits.sleep>0&&html`<div style=${{marginTop:8}}>
          <${PBar} value=${state.habits.sleep} max=${state.goals.sleep} color="#534AB7"/>
          <p style=${{fontSize:11,color:"#666",marginTop:3}}>${state.habits.sleep} / ${state.goals.sleep} hrs goal</p>
        </div>`}
      </div>
    <//>
    <${Card}>
      <${CT} icon="ti-chart-bar">Today's Summary<//>
      ${[{label:"Water goal",done:state.habits.water},{label:"Sleep logged",done:state.habits.sleep>0},{label:"Devotion",done:state.habits.devotion}].map((h,i,arr)=>html`<div key=${i} style=${{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"8px 0",borderBottom:i<arr.length-1?"0.5px solid rgba(0,0,0,0.08)":"none"}}>
        <span style=${{fontSize:14}}>${h.label}</span>
        <${Tag} color=${h.done?"green":"amber"}>${h.done?"Done":"Pending"}<//>
      </div>`)}
    <//>
    <${Card}><${CT} icon="ti-sparkles">AI Habit Insights<//>
      <${Btn} onClick=${getInsights}>Get insights<//>

}

function WeightTab({state,setState}){
  const [weightInput,setWeightInput]=useState("");const [goalInput,setGoalInput]=useState("");const [heightInput,setHeightInput]=useState("");const [unit,setUnit]=useState("kg");
  const wLog=state.weightLog||[];
  const latest=wLog.length?wLog[wLog.length-1]:null;
  const latestKg=latest?.weight||null;const hCm=state.heightCm;const gW=state.goalWeight;
  function bmi(kg,cm){if(!kg||!cm)return null;return(kg/((cm/100)**2)).toFixed(1);}
  function bmiCat(b){if(!b)return null;const n=parseFloat(b);if(n<18.5)return{label:"Underweight",color:"#185FA5"};if(n<25)return{label:"Healthy",color:"#1D9E75"};if(n<30)return{label:"Overweight",color:"#BA7517"};return{label:"Obese",color:"#A32D2D"};}
  function logWeight(){let kg=parseFloat(weightInput);if(!kg)return;if(unit==="lbs")kg*=0.453592;if(unit==="st")kg*=6.35029;kg=Math.round(kg*10)/10;const ex=wLog.findIndex(e=>e.date===TODAY);const nl=ex>=0?wLog.map((e,i)=>i===ex?{...e,weight:kg}:e):[...wLog,{date:TODAY,weight:kg}];setState(s=>({...s,weightLog:nl}));setWeightInput("");}
  const curBMI=bmi(latestKg,hCm);const cat=bmiCat(curBMI);
  const toGoal=latestKg&&gW?(latestKg-gW).toFixed(1):null;
  const last20=wLog.slice(-20);
  const maxW=last20.length?Math.max(...last20.map(e=>e.weight)):80;
  const minW=last20.length?Math.min(...last20.map(e=>e.weight)):50;
  const range=Math.max(maxW-minW,5);const svgW=Math.max(300,last20.length*44);

  return html`<div>
    <div style=${{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(120px,1fr))",gap:8,marginBottom:12}}>
      <${MCard} label="Current weight" value=${latestKg?`${latestKg} kg`:"--"} unit=${hCm?"BMI "+(curBMI||"--"):"Add height for BMI"} color="#D85A30"/>
      <${MCard} label="Goal weight" value=${gW?`${gW} kg`:"--"} unit=${toGoal?(parseFloat(toGoal)>0?`${toGoal}kg to lose`:`${Math.abs(parseFloat(toGoal))}kg to gain`):"Set a goal"}/>
      ${cat&&html`<${MCard} label="BMI status" value=${curBMI} unit=${cat.label} color=${cat.color}/>`}
      <${MCard} label="Entries" value=${wLog.length} unit="weigh-ins logged"/>
    </div>
    <${Card}>
      <${CT} icon="ti-scale">Log Weight<//>
      <div style=${{display:"flex",gap:8,marginBottom:10,flexWrap:"wrap",alignItems:"center"}}>
        <${Inp} value=${weightInput} onChange=${e=>setWeightInput(e.target.value)} type="number" step="0.1" placeholder="Enter weight" style=${{flex:"1 1 100px"}}/>
        <${Sel} value=${unit} onChange=${e=>setUnit(e.target.value)}>
          <option value="kg">kg</option><option value="lbs">lbs</option><option value="st">stone</option>
        <//>
        <${Btn} onClick=${logWeight} primary=${true}>+ Log<//>
      </div>
    <//>
    <${Card}>
      <${CT} icon="ti-settings">Settings<//>
      <div style=${{display:"flex",flexWrap:"wrap",gap:10}}>
        <div style=${{flex:"1 1 130px"}}>
          <p style=${{fontSize:12,color:"#666",marginBottom:4}}>Height (cm)</p>
          <${Inp} value=${heightInput} onChange=${e=>setHeightInput(e.target.value)} type="number" placeholder=${hCm?String(hCm):"e.g. 165"}/>
        </div>
        <div style=${{flex:"1 1 130px"}}>
          <p style=${{fontSize:12,color:"#666",marginBottom:4}}>Goal weight (kg)</p>
          <${Inp} value=${goalInput} onChange=${e=>setGoalInput(e.target.value)} type="number" placeholder=${gW?String(gW):"e.g. 65"}/>
        </div>
        <div style=${{display:"flex",alignItems:"flex-end"}}>
          <${Btn} onClick=${()=>{setState(s=>({...s,heightCm:parseFloat(heightInput)||s.heightCm,goalWeight:parseFloat(goalInput)||s.goalWeight}));setHeightInput("");setGoalInput("");}}>Save<//>
        </div>
      </div>
    <//>
    ${last20.length>=2&&html`<${Card}>
      <${CT} icon="ti-chart-line">Weight Trend<//>
      <div style=${{overflowX:"auto"}}>
        <svg width=${svgW} height=${150} style=${{display:"block"}}>
          ${last20.map((entry,i,arr)=>{
            const x=arr.length>1?(i/(arr.length-1))*(svgW-40)+20:svgW/2;
            const y=110-((entry.weight-minW)/range)*90;
            const next=arr[i+1];
            const nx=next?((i+1)/(arr.length-1))*(svgW-40)+20:null;
            const ny=next?110-((next.weight-minW)/range)*90:null;
            return html`<g key=${i}>
              ${next&&html`<line x1=${x} y1=${y} x2=${nx} y2=${ny} stroke="#534AB7" stroke-width="2" opacity="0.6"/>`}
              <circle cx=${x} cy=${y} r=${4} fill="#534AB7"/>
              <text x=${x} y=${y-8} text-anchor="middle" font-size=${10} fill="#666">${entry.weight}</text>
              ${(i===0||i===arr.length-1)&&html`<text x=${x} y=${135} text-anchor="middle" font-size=${9} fill="#666">${entry.date.slice(5)}</text>`}
            </g>`;
          })}
          ${gW&&minW<=gW&&gW<=maxW&&(()=>{const gy=110-((gW-minW)/range)*90;return html`<line x1=${20} y1=${gy} x2=${svgW-20} y2=${gy} stroke="#1D9E75" stroke-width="1.5" stroke-dasharray="4,4" opacity="0.7"/>`;})()}
        </svg>
      </div>
    <//>`}
    <${Card}>
      <${CT} icon="ti-list">Weight Log<//>
      ${!wLog.length?html`<p style=${{fontSize:13,color:"#666"}}>No entries yet.</p>`:
        [...wLog].reverse().map((e,i)=>html`<div key=${i} style=${{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"8px 0",borderBottom:i<wLog.length-1?"0.5px solid rgba(0,0,0,0.08)":"none"}}>

          <${Btn} onClick=${()=>setState(s=>({...s,weightLog:s.weightLog.filter((_,j)=>j!==wLog.length-1-i)}))} danger=${true} small=${true}>x<//>
        </div>`)}
    <//>
  </div>`;
}

// ── CYCLE ──────────────────────────────────────────────────────────────────────
function computeCycleDay(cycle){
  if(!cycle.periodDates||!cycle.periodDates.length)return null;
  const sorted=[...cycle.periodDates].sort((a,b)=>a.start>b.start?-1:1);
  const lastStart=new Date(sorted[0].start);
  const diff=Math.floor((new Date()-lastStart)/86400000);
  const avgLen=cycle.avgCycleLength||28;
  const day=diff%avgLen;
  const phases=[
    {name:"Menstrual",color:"#993556",bg:"#FBEAF0",border:"#F4C0D1",emoji:"M",desc:"Rest and restore. Your body is working hard."},
    {name:"Follicular",color:"#0F6E56",bg:"#E1F5EE",border:"#9FE1CB",emoji:"F",desc:"Energy rising. Great time to try new workouts."},
    {name:"Ovulation",color:"#534AB7",bg:"#EEEDFE",border:"#CECBF6",emoji:"O",desc:"Peak energy and strength. Push your limits!"},
    {name:"Luteal",color:"#854F0B",bg:"#FAEEDA",border:"#FAC775",emoji:"L",desc:"Wind down. Focus on consistency over intensity."}
  ];
  const d=cycle.avgPeriodDuration||5;
  const phase=day<d?phases[0]:day<13?phases[1]:day<16?phases[2]:phases[3];
  return{...phase,dayOfCycle:day+1,nextPeriodIn:avgLen-day,avgLen};
}

      ${activeTab==="habits"&&html`<${HabitsTab} state=${state} setState=${setState}/>`}
      ${activeTab==="goals"&&html`<${GoalsTab} state=${state} setState=${setState}/>`}
      ${activeTab==="weight"&&html`<${WeightTab} state=${state} setState=${setState}/>`}
      ${activeTab==="cycle"&&html`<${CycleTab} state=${state} setState=${setState}/>`}
    </div>
  </div>`;
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(html`<${App}/>`);
</script>
</body>
</html>
