<!DOCTYPE html>

<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="Wellness Hub"/>
<title>Wellness Hub</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,system-ui,sans-serif;background:#f5f5f0;color:#1a1a1a;min-height:100vh}
input,select,button,textarea{font-family:inherit}
.app{max-width:700px;margin:0 auto;padding-bottom:80px}
.header{padding:1.25rem 1rem 0}
.header h1{font-size:20px;font-weight:500}
.header p{font-size:13px;color:#666;margin-top:2px}
.tabs{display:flex;gap:6px;padding:.75rem 1rem;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{white-space:nowrap;padding:6px 12px;border-radius:20px;border:0.5px solid rgba(0,0,0,0.2);background:#fff;color:#666;font-size:13px;cursor:pointer;display:inline-flex;align-items:center;gap:5px}
.tab.active{background:#1a1a1a;color:#fff;border-color:transparent}
.content{padding:0 1rem}
.card{background:#fff;border:0.5px solid rgba(0,0,0,0.1);border-radius:12px;padding:14px 18px;margin-bottom:12px}
.card-title{font-size:15px;font-weight:500;display:flex;align-items:center;gap:8px;margin-bottom:12px}
.metric-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:8px;margin-bottom:12px}
.metric{background:#f8f8f5;border-radius:8px;padding:12px 14px}
.metric .lbl{font-size:12px;color:#666;margin-bottom:2px}
.metric .val{font-size:19px;font-weight:500}
.metric .unit{font-size:12px;color:#666}
input[type=text],input[type=number],input[type=date],input[type=time],select,textarea{
  width:100%;padding:8px 10px;border-radius:8px;border:0.5px solid rgba(0,0,0,0.2);
  font-size:14px;background:#fff;color:#1a1a1a;outline:none}
input:focus,select:focus,textarea:focus{border-color:rgba(0,0,0,0.5)}
.btn{padding:8px 14px;border-radius:8px;border:0.5px solid rgba(0,0,0,0.2);background:#fff;
  color:#1a1a1a;font-size:14px;cursor:pointer;display:inline-flex;align-items:center;gap:5px;white-space:nowrap;flex-shrink:0}
.btn:hover{background:#f5f5f0}
.btn.primary{background:#1a1a1a;color:#fff;border-color:transparent}
.btn.primary:hover{opacity:.85}
.btn.danger{color:#A32D2D;border-color:#F7C1C1}
.btn.small{padding:5px 10px;font-size:12px}
.pbar{height:8px;background:#eee;border-radius:4px;overflow:hidden;margin-top:4px}
.pfill{height:100%;border-radius:4px;transition:width .3s}
.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.tag{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:500}
.tag.green{background:#EAF3DE;color:#3B6D11}
.tag.amber{background:#FAEEDA;color:#854F0B}
.tag.blue{background:#E6F1FB;color:#185FA5}
.tag.pink{background:#FBEAF0;color:#993556}
.tag.purple{background:#EEEDFE;color:#534AB7}
.tag.red{background:#FCEBEB;color:#A32D2D}
.ai-box{background:#f8f8f5;border-radius:8px;padding:10px 12px;margin-top:8px;font-size:13px;line-height:1.6;color:#555;white-space:pre-wrap}
.chip{padding:5px 12px;border-radius:20px;border:0.5px solid rgba(0,0,0,0.2);background:#fff;color:#666;font-size:13px;cursor:pointer;white-space:nowrap}
.chip.active{background:#1a1a1a;color:#fff;border-color:transparent}
.toggle{width:40px;height:22px;border-radius:11px;background:#ddd;border:none;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0}
.toggle.on{background:#1D9E75}
.toggle::after{content:'';position:absolute;top:3px;left:3px;width:16px;height:16px;border-radius:50%;background:#fff;transition:transform .2s}
.toggle.on::after{transform:translateX(18px)}
.food-row,.entry-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:0.5px solid rgba(0,0,0,0.08)}
.food-row:last-child,.entry-row:last-child{border-bottom:none}
.hidden{display:none!important}
.flex{display:flex;gap:8px}
.verified{font-size:11px;background:#EAF3DE;color:#3B6D11;padding:1px 6px;border-radius:8px;flex-shrink:0}
</style>
</head>

// Storage with fallback to memory if localStorage is blocked
let memStorage = null;
function storageGet(key){
  try{ return localStorage.getItem(key); }
  catch(e){ return memStorage ? JSON.stringify(memStorage) : null; }
}
function storageSet(key, val){
  try{ localStorage.setItem(key, val); }
  catch(e){ try{ memStorage = JSON.parse(val); }catch(e2){} }
}

function loadState(){
  try{
    const raw=storageGet(STORAGE_KEY);
    if(!raw) return;
    const s=JSON.parse(raw);
    if(s.date!==TODAY){
      s.date=TODAY;s.foods=[];s.water=0;s.steps=0;
      s.habits={water:false,devotion:false,sleep:0,bedtime:"",wakeTime:""};
    }
    state={...state,...s};
  }catch(e){ console.log("State load error:", e); }
}

function save(){
  try{ storageSet(STORAGE_KEY, JSON.stringify(state)); }catch(e){}
}

function smartToGrams(qty,unit,food){
  if(unit==="g"||unit==="ml") return qty;
  if(unit==="kg") return qty*1000;
  if(unit==="l") return qty*1000;
  if(unit==="oz") return qty*28.35;
  if(unit==="lb") return qty*453.6;
  if(unit==="tbsp") return qty*15;
  if(unit==="tsp") return qty*5;
  if(unit==="cup") return qty*(food&&food.cupG||240);
  return qty*(food&&food.itemG||100);
}

function searchLocalDB(query){
  const q=query.toLowerCase().trim();
  if(!q) return [];
  const words=q.split(/\s+/).filter(w=>w.length>0);
  // Also try reversed word order e.g. "lemon cake" -> also check "cake lemon"
  const reversed=words.slice().reverse().join(" ");
  
  const scored=FOOD_DB.map(food=>{
    const name=food.name.toLowerCase();
    let score=0;
    // Exact match
    if(name===q) score+=30;
    if(name===reversed) score+=28;
    // Full query contained in name
    if(name.includes(q)) score+=15;
    if(name.includes(reversed)) score+=13;
    // All words present (any order)
    const allWordsMatch=words.every(w=>w.length<2||name.includes(w));
    if(allWordsMatch && words.length>1) score+=10;
    // Name starts with any word
    words.forEach(w=>{
      if(w.length<2) return;
      if(name.startsWith(w)) score+=6;
      if(name.includes(w)) score+=3;
    });
    // Stem matching (first 4 chars)
    words.forEach(w=>{
      if(w.length>=4){
        if(name.includes(w.slice(0,4))) score+=1;
      }
    });
    return{food,score};
  }).filter(x=>x.score>0).sort((a,b)=>b.score-a.score);
  
  return scored.slice(0,8).map(x=>x.food);
}

async function callAI(prompt){
  if(!OPENROUTER_KEY){
    throw new Error("AI features need setup. Get a free key at openrouter.ai and paste it in the OPENROUTER_KEY field in the app file.");
  }
  const r=await fetch("https://openrouter.ai/api/v1/chat/completions",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":"Bearer "+OPENROUTER_KEY,
      "HTTP-Referer":"https://rubirocarol-lab.github.io/Wellness/",
      "X-Title":"Wellness Hub"
    },
    body:JSON.stringify({
      model:"mistralai/mistral-7b-instruct:free",
      messages:[{role:"user",content:prompt}]
    })
  });
  const d=await r.json();
  if(!r.ok || d.error){
    const msg = d.error?.message || d.error || ("HTTP "+r.status);
    throw new Error("OpenRouter error: "+msg);
  }
  if(!d.choices || !d.choices[0]){
    throw new Error("No response from AI. Response: "+JSON.stringify(d));
  }
  return d.choices[0].message.content||"";
}

function searchExerciseDB(query){
  const q=query.toLowerCase().trim();
  const words=q.split(/\s+/).filter(w=>w.length>1);
  const scored=EXERCISE_DB.map(ex=>{
    const name=ex.name.toLowerCase();
    const muscles=ex.muscles.toLowerCase();
    let score=0;
    if(name===q) score+=20;
    if(name.includes(q)) score+=8;
    words.forEach(w=>{
      if(name.includes(w)) score+=4;
      if(muscles.includes(w)) score+=2;
      if(w.length>=3 && name.includes(w.slice(0,3))) score+=1;
    });
    return{ex,score};
  }).filter(x=>x.score>0).sort((a,b)=>b.score-a.score);
  return scored.length>0?scored[0].ex:null;
}

// ── HELPERS ────────────────────────────────────────────────────────────────────
function el(tag,attrs={},children=[]){
  const e=document.createElement(tag);
  // Handle case where attrs is actually children array
  if(Array.isArray(attrs)){children=attrs;attrs={};}
  Object.entries(attrs).forEach(([k,v])=>{
    if(k==="style"&&typeof v==="object") Object.assign(e.style,v);
    else if(k.startsWith("on")&&typeof v==="function") e.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==="class") e.className=v;
    else if(k==="html") e.innerHTML=v;
    else e.setAttribute(k,v);
  });
  (Array.isArray(children)?children:[children]).forEach(c=>{
    if(c===null||c===undefined||c===false||c==="") return;
    if(typeof c==="string"||typeof c==="number") e.appendChild(document.createTextNode(String(c)));
    else if(c instanceof Node) e.appendChild(c);
    else if(Array.isArray(c)) c.forEach(cc=>{if(cc&&cc instanceof Node)e.appendChild(cc);else if(cc!==null&&cc!==undefined&&cc!==false)e.appendChild(document.createTextNode(String(cc)));});
  });
  return e;
}

function pbar(value,max,color="#1D9E75"){
  const pct=Math.min(100,max>0?Math.round(value/max*100):0);
  return el("div",{class:"pbar"},[el("div",{class:"pfill",style:{width:pct+"%",background:color}})]);
}

function mcard(label,value,unit,color){
  return el("div",{class:"metric"},[
    el("div",{class:"lbl"},[label]),
    el("div",{class:"val",style:{color:color||""}},[String(value)]),
    el("div",{class:"unit"},[unit])
  ]);
}

function cardTitle(icon,text){
  return el("div",{class:"card-title"},[el("i",{class:"ti "+icon,"aria-hidden":"true"}),text]);
}

function btn(text,onClick,cls=""){
  return el("button",{class:"btn "+(cls||""),onClick},[text]);
}

function tag(text,color="green"){
  return el("span",{class:"tag "+color},[text]);
}

function chip(text,active,onClick){
  return el("button",{class:"chip"+(active?" active":""),onClick},[text]);
}

function toggle(on,onClick){
  return el("button",{class:"toggle"+(on?" on":""),onClick});
}

function aiBox(text,loading){
  if(!text&&!loading) return null;
  return el("div",{class:"ai-box"},[loading?"Thinking...":text]);
}

function unitSelect(value,onChange){
  const s=el("select",{onChange});
  UNIT_OPTIONS.forEach(o=>{
    const opt=el("option",{value:o.v},[o.l]);
    if(o.v===value) opt.selected=true;
    s.appendChild(opt);
  });
  return s;
}

  const pS=Math.round(protCals/tot*100),cS=Math.round(carbCals/tot*100),fS=Math.round(fatCals/tot*100);
  if(tot>1){
    const bar=el("div",{style:{display:"flex",height:10,borderRadius:5,overflow:"hidden",marginBottom:10,gap:2}});

  }
  [{label:"Protein",val:totalProt,goal:state.goals.protein||150,unit:"g",color:"#534AB7",split:pS},
   {label:"Carbs",val:totalCarbs,goal:null,unit:"g",color:"#BA7517",split:cS},
   {label:"Fat",val:totalFat,goal:null,unit:"g",color:"#1D9E75",split:fS},
   {label:"Fibre",val:totalFibre,goal:25,unit:"g",color:"#0F6E56",split:null}
  ].forEach(m=>{
    const row=el("div",{style:{marginBottom:10}});
    const hdr=el("div",{style:{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:2}});
    const dot=el("span",{style:{width:10,height:10,borderRadius:"50%",background:m.color,display:"inline-block",marginRight:6}});
    const lbl=el("span",{},[dot,m.label,m.split!==null?el("span",{style:{fontSize:11,color:"#666",marginLeft:4}},[" ("+m.split+"%)"]):""].filter(Boolean));
    const val=el("span",{style:{color:"#666"}},[el("strong",{style:{color:m.color}},[m.val.toFixed(1)+m.unit]),m.goal?" / "+m.goal+m.unit+" goal":""]);
    hdr.appendChild(lbl);hdr.appendChild(val);row.appendChild(hdr);
    if(m.goal) row.appendChild(pbar(m.val,m.goal,m.color));
    else row.appendChild(el("div",{style:{height:6,background:m.color,borderRadius:3,opacity:0.25,marginTop:4}}));
    macroCard.appendChild(row);
  });
  div.appendChild(macroCard);

  // Search card
  const searchCard=el("div",{class:"card"});
  searchCard.appendChild(cardTitle("ti-search","Search Food Database"));
  searchCard.appendChild(el("p",{style:{fontSize:12,color:"#666",marginBottom:8}},["400+ foods including Kenyan & African staples. AI fallback if not found."]));
  const searchRow=el("div",{class:"row",style:{marginBottom:8}});
  const searchInp=el("input",{type:"text",placeholder:"e.g. ugali, chapati, chicken, avocado..."});
  const resultsDiv=el("div");
  const aiResultDiv=el("div");

  async function doSearch(){
    const q=searchInp.value.trim();
    if(!q) return;
    resultsDiv.innerHTML="";
    aiResultDiv.innerHTML="";

    // STEP 1: Local DB (instant, always works)
    const local=searchLocalDB(q);
    if(local.length){
      renderResults(local.map(f=>({
        name:f.name,cal:f.cal,pro:f.pro,carb:f.carb,fat:f.fat,
        note:f.note||"",itemG:f.itemG,cupG:f.cupG,fromDB:true
      })));
    }

    // STEP 2: USDA + Open Food Facts in parallel
    aiResultDiv.innerHTML="<p style='font-size:12px;color:#999;margin:6px 0'>Searching online databases...</p>";

    let apiResults=[];

    try{
      // USDA FoodData Central
      const usdaUrl="https://api.nal.usda.gov/fdc/v1/foods/search?query="+encodeURIComponent(q)+"&pageSize=8&api_key=DEMO_KEY";
      const usdaResp=await fetch(usdaUrl,{signal:AbortSignal.timeout(8000)});
      const usdaData=await usdaResp.json();
      if(usdaData.foods&&usdaData.foods.length){
        usdaData.foods.forEach(f=>{
          const n=f.foodNutrients||[];
          const get=(...ids)=>{for(const id of ids){const found=n.find(x=>x.nutrientId===id||x.nutrientNumber===String(id));if(found&&found.value)return Math.round(found.value*10)/10;}return 0;};
          const cal=get(1008,208);
          if(cal>0) apiResults.push({
            name:f.description+(f.brandName&&f.brandName!==f.description?" ("+f.brandName+")":""),
            cal:Math.round(cal),pro:get(1003,203),carb:get(1005,205),fat:get(1004,204),fibre:get(1079,291),
            note:f.servingSize?(Math.round(f.servingSize)+(f.servingSizeUnit||"g")):"per 100g",
            badge:"USDA",badgeColor:"#185FA5",badgeBg:"#E6F1FB"
          });
        });
      }
    }catch(e){console.log("USDA error:",e.message);}

    try{
      // Open Food Facts - good for African, Asian, local/regional products
      const offUrl="https://world.openfoodfacts.org/cgi/search.pl?search_terms="+encodeURIComponent(q)+"&search_simple=1&action=process&json=1&page_size=8&fields=product_name,brands,nutriments,countries_tags,quantity&lc=en";
      const offResp=await fetch(offUrl,{signal:AbortSignal.timeout(8000)});
      const offData=await offResp.json();
      if(offData.products&&offData.products.length){
        const africanCountries=["en:kenya","en:nigeria","en:ghana","en:ethiopia","en:tanzania","en:uganda","en:south-africa","en:egypt","en:morocco","en:zimbabwe","en:zambia","en:cameroon","en:senegal","en:rwanda","en:malawi","en:mozambique"];
        offData.products.forEach(p=>{
          if(!p.product_name||!p.nutriments) return;
          const kcal=p.nutriments["energy-kcal_100g"]||p.nutriments["energy-kcal"]||0;
          if(!kcal||kcal>950) return;
          if(/[^\u0000-\u024F\s]/.test(p.product_name)) return;
          const n=p.nutriments;
          const countries=p.countries_tags||[];
          const isAfrican=countries.some(c=>africanCountries.includes(c));
          // Check if it's a duplicate
          const isDup=apiResults.some(r=>r.name.toLowerCase().includes(p.product_name.toLowerCase().slice(0,8)));
          if(!isDup) apiResults.push({
            name:p.product_name+(p.brands&&p.brands.slice(0,20)!=p.product_name?" ("+p.brands.slice(0,30)+")":""),
            cal:Math.round(kcal),
            pro:Math.round((n.proteins_100g||0)*10)/10,
            carb:Math.round((n.carbohydrates_100g||0)*10)/10,
            fat:Math.round((n.fat_100g||0)*10)/10,
            fibre:Math.round((n.fiber_100g||n["fiber-g_100g"]||0)*10)/10,
            note:p.quantity||"per 100g",
            isAfrican,
            badge:isAfrican?"🌍 African":"World",
            badgeColor:isAfrican?"#3B6D11":"#666",
            badgeBg:isAfrican?"#EAF3DE":"#F0F0EC"
          });
        });
      }
    }catch(e){console.log("OFF error:",e.message);}

    aiResultDiv.innerHTML="";

    if(apiResults.length){
      // Sort: African first, then by name match
      apiResults.sort((a,b)=>{
        if(a.isAfrican&&!b.isAfrican) return -1;
        if(!a.isAfrican&&b.isAfrican) return 1;
        return 0;
      });
      const label=el("p",{style:{fontSize:12,color:"#666",margin:"8px 0 6px"}},["Found "+apiResults.length+" results from USDA & Open Food Facts:"]);
      aiResultDiv.appendChild(label);
      const apiDiv=document.createElement("div");
      renderResults(apiResults.slice(0,10),apiDiv);
      aiResultDiv.appendChild(apiDiv);
    } else if(!local.length){
      // Nothing found anywhere
      aiResultDiv.innerHTML="<div class='ai-box'><strong>"+q+"</strong> not found in any database.<br><br>"+
        "Tips: Try simpler terms e.g. 'oreo' instead of 'oreo cake', or use <strong>Manual Entry</strong> below to add it yourself.</div>";
      const manNameInp=document.querySelector("#manual-food-name");
      if(manNameInp) manNameInp.value=q;
    } else if(!apiResults.length){
      // Local found but no online results
      const note=el("p",{style:{fontSize:12,color:"#999",margin:"8px 0"}},["No additional online results found."]);
      aiResultDiv.appendChild(note);
    }
  }

function renderWorkoutSession(){
  if(!sessionProg){workoutView="programs";render();return el("div");}
  const div=el("div");
  const backBtn=btn("Back","","btn");backBtn.addEventListener("click",()=>{workoutView="programs";render();});
  div.appendChild(el("div",{class:"row",style:{marginBottom:12}},[backBtn,el("p",{style:{fontWeight:500,fontSize:15}},["Logging: "+sessionProg.name])]));

  sessionProg.exercises.forEach((ex,i)=>{
    // Find PB
    let pb=null;
    (state.workoutSessions||[]).forEach(sess=>sess.exercises.forEach(e=>{if(e.name===ex.name)e.sets.forEach(s=>{if(s.weight&&(!pb||parseFloat(s.weight)>pb.weight))pb={weight:parseFloat(s.weight),reps:parseInt(s.reps)||0,date:sess.date};});}));
    const card=el("div",{class:"card"});
    const hdr=el("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}});
    const nameDiv=el("div",[el("p",{style:{fontSize:15,fontWeight:500}},[ex.name])]);
    if(pb) nameDiv.appendChild(el("p",{style:{fontSize:12,color:"#534AB7"}},["PB: "+pb.weight+"kg x "+pb.reps+" reps ("+pb.date+")"]));
    const ytLink=el("a",{href:"https://www.youtube.com/results?search_query="+ex.ytQuery,target:"_blank",style:{fontSize:12,color:"#185FA5",textDecoration:"none"}},["Watch"]);
    hdr.appendChild(nameDiv);hdr.appendChild(ytLink);card.appendChild(hdr);

    const grid=el("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr 28px",gap:6,marginBottom:4}});
    grid.appendChild(el("p",{style:{fontSize:11,color:"#666"}},["Reps"]));
    grid.appendChild(el("p",{style:{fontSize:11,color:"#666"}},["Weight (kg)"]));
    grid.appendChild(el("span"));
    card.appendChild(grid);

    if(!sessionSets[i]) sessionSets[i]=[{reps:"",weight:""}];
    const setsDiv=el("div");
    function renderSets(){
      setsDiv.innerHTML="";
      sessionSets[i].forEach((s,j)=>{
        const row=el("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr 28px",gap:6,marginBottom:6,alignItems:"center"}});
        const repsInp=el("input",{type:"number",value:s.reps,placeholder:"10"});
        repsInp.addEventListener("input",e=>{sessionSets[i][j].reps=e.target.value;});
        const wgtInp=el("input",{type:"number",value:s.weight,placeholder:"60"});
        wgtInp.addEventListener("input",e=>{sessionSets[i][j].weight=e.target.value;});
        const delBtn=el("button",{style:{background:"none",border:"none",cursor:"pointer",color:"#A32D2D",fontSize:16}},["x"]);
        delBtn.addEventListener("click",()=>{sessionSets[i].splice(j,1);renderSets();});
        row.appendChild(repsInp);row.appendChild(wgtInp);row.appendChild(delBtn);setsDiv.appendChild(row);
      });
    }
    renderSets();
    card.appendChild(setsDiv);
    const addSetBtn=btn("+ Add set","","btn small");
    addSetBtn.addEventListener("click",()=>{sessionSets[i].push({reps:"",weight:""});renderSets();});
    card.appendChild(addSetBtn);
    div.appendChild(card);
  });

  const notesCard=el("div",{class:"card"});
  notesCard.appendChild(cardTitle("ti-notes","Session notes"));
  const notesTA=el("textarea",{placeholder:"How did it feel?",rows:3,style:{width:"100%",resize:"vertical",boxSizing:"border-box"}});
  notesTA.value=sessionNotes;
  notesTA.addEventListener("input",e=>{sessionNotes=e.target.value;});
  notesCard.appendChild(notesTA);div.appendChild(notesCard);

  const saveBtn=btn("Save session","","btn primary");
  saveBtn.style.width="100%";saveBtn.style.justifyContent="center";
  saveBtn.addEventListener("click",()=>{
    const exercises=sessionProg.exercises.map((e,i)=>({name:e.name,sets:(sessionSets[i]||[]).filter(s=>s.reps||s.weight)}));
    if(!state.workoutSessions) state.workoutSessions=[];
    state.workoutSessions.push({id:Date.now().toString(),date:TODAY,programName:sessionProg.name,programId:sessionProg.id,exercises,notes:sessionNotes});
    save();workoutView="programs";render();
  });
  div.appendChild(saveBtn);
  return div;
}

// ── STEPS ──────────────────────────────────────────────────────────────────────
let stepsHistView="monthly";
function renderSteps(){
  const div=el("div");
  const stepHistory=state.stepHistory||[];
  const mGoal=state.goals.monthlySteps||(state.goals.steps*30);
  const curMonth=TODAY.slice(0,7);
  const bm={};stepHistory.forEach(h=>{const m=h.date.slice(0,7);if(!bm[m])bm[m]={total:0,days:0};bm[m].total+=h.steps;bm[m].days+=1;});
  const curTotal=(bm[curMonth]||{total:state.steps}).total;

  const grid=el("div",{class:"metric-grid"});
  grid.appendChild(mcard("Today",state.steps.toLocaleString(),"steps","#534AB7"));
  grid.appendChild(mcard("Daily goal",state.goals.steps.toLocaleString(),"steps"));
  grid.appendChild(mcard("This month",curTotal.toLocaleString(),"/ "+mGoal.toLocaleString(),"#1D9E75"));
  grid.appendChild(mcard("Burned",Math.round(state.steps*0.04),"kcal est.","#D85A30"));
  div.appendChild(grid);

  const logCard=el("div",{class:"card"});
  logCard.appendChild(cardTitle("ti-shoe","Log Steps"));
  const stepsInp=el("input",{type:"number",placeholder:"Number of steps"});
  const logBtn=btn("Log","","btn primary");
  logBtn.addEventListener("click",()=>{
    const v=parseInt(stepsInp.value)||0;if(!v)return;
    const nh=stepHistory.filter(h=>h.date!==TODAY);nh.push({date:TODAY,steps:v});
    state.steps=v;state.stepHistory=nh.slice(-365);save();render();
  });
  logCard.appendChild(el("div",{class:"row",style:{marginBottom:10}},[stepsInp,logBtn]));
  logCard.appendChild(pbar(state.steps,state.goals.steps,"#534AB7"));
  logCard.appendChild(el("p",{style:{fontSize:12,color:"#666",marginTop:4}},[state.steps.toLocaleString()+" / "+state.goals.steps.toLocaleString()+" today"]));
  logCard.appendChild(el("div",{style:{marginTop:10}},[pbar(curTotal,mGoal,"#1D9E75"),el("p",{style:{fontSize:12,color:"#666",marginTop:4}},[curTotal.toLocaleString()+" / "+mGoal.toLocaleString()+" this month"])]));
  div.appendChild(logCard);

  const goalCard=el("div",{class:"card"});
  goalCard.appendChild(cardTitle("ti-settings","Step Goals"));
  const gr=el("div",{class:"row",style:{flexWrap:"wrap",gap:10}});
  const dInp=el("input",{type:"number",placeholder:String(state.goals.steps)});
  const dSave=btn("Save","","btn");dSave.addEventListener("click",()=>{state.goals.steps=parseInt(dInp.value)||state.goals.steps;save();render();});
  const mInp=el("input",{type:"number",placeholder:String(mGoal)});
  const mSave=btn("Save","","btn");mSave.addEventListener("click",()=>{state.goals.monthlySteps=parseInt(mInp.value)||mGoal;save();render();});
  gr.appendChild(el("div",{style:{flex:"1 1 130px"}},[el("p",{style:{fontSize:12,color:"#666",marginBottom:4}},["Daily goal"]),el("div",{class:"row"},[dInp,dSave])]));
  gr.appendChild(el("div",{style:{flex:"1 1 130px"}},[el("p",{style:{fontSize:12,color:"#666",marginBottom:4}},["Monthly goal"]),el("div",{class:"row"},[mInp,mSave])]));
  goalCard.appendChild(gr);div.appendChild(goalCard);

  const histCard=el("div",{class:"card"});
  histCard.appendChild(cardTitle("ti-chart-line","Step History"));
  const tabs=el("div",{class:"row",style:{marginBottom:12}});
  const mTab=chip("Monthly",stepsHistView==="monthly",()=>{stepsHistView="monthly";render();});
  const dTab=chip("Daily (last 30)",stepsHistView==="daily",()=>{stepsHistView="daily";render();});
  tabs.appendChild(mTab);tabs.appendChild(dTab);histCard.appendChild(tabs);

  if(stepsHistView==="monthly"){
    const entries=Object.entries(bm).sort((a,b)=>b[0]>a[0]?1:-1).slice(0,12);
    if(!entries.length){histCard.appendChild(el("p",{style:{fontSize:13,color:"#666"}},["No history yet."]));}
    else entries.forEach(([month,data])=>{
      const ym=month.split("-");
      const label=new Date(parseInt(ym[0]),parseInt(ym[1])-1,1).toLocaleDateString("en-GB",{month:"short",year:"numeric"});
      const d=el("div",{style:{marginBottom:12}});
      d.appendChild(el("div",{style:{display:"flex",justifyContent:"space-between",fontSize:12,color:"#666",marginBottom:2}},[el("span",{style:{fontWeight:500}},[label]),el("span",[data.total.toLocaleString()+" steps · "+data.days+" days"])]));
      d.appendChild(pbar(data.total,mGoal,"#534AB7"));
      d.appendChild(el("p",{style:{fontSize:11,color:"#666",marginTop:2}},[Math.round(data.total/mGoal*100)+"% of monthly goal"]));
      histCard.appendChild(d);
    });
  } else {
    if(!stepHistory.length){histCard.appendChild(el("p",{style:{fontSize:13,color:"#666"}},["No history yet."]));}

// ── CYCLE ──────────────────────────────────────────────────────────────────────
let cycleSection="overview";
function computeCycleDay(cycle){
  if(!cycle.periodDates||!cycle.periodDates.length)return null;
  const sorted=[...cycle.periodDates].sort((a,b)=>a.start>b.start?-1:1);
  const diff=Math.floor((new Date()-new Date(sorted[0].start))/86400000);
  const len=cycle.avgCycleLength||28;const day=diff%len;const d=cycle.avgPeriodDuration||5;
  const phases=[
    {name:"Menstrual",color:"#993556",bg:"#FBEAF0",border:"#F4C0D1",desc:"Rest and restore. Your body is working hard."},
    {name:"Follicular",color:"#0F6E56",bg:"#E1F5EE",border:"#9FE1CB",desc:"Energy rising. Great time to try new workouts."},
    {name:"Ovulation",color:"#534AB7",bg:"#EEEDFE",border:"#CECBF6",desc:"Peak energy and strength. Push your limits!"},
    {name:"Luteal",color:"#854F0B",bg:"#FAEEDA",border:"#FAC775",desc:"Wind down. Focus on consistency over intensity."}
  ];
  const phase=day<d?phases[0]:day<13?phases[1]:day<16?phases[2]:phases[3];
  return{...phase,dayOfCycle:day+1,nextPeriodIn:len-day,avgLen:len};
}

    div.appendChild(card);
  }

  else if(cycleSection==="ovulation"){
    const card=el("div",{class:"card"});card.appendChild(cardTitle("ti-sparkles","Log Ovulation"));
    card.appendChild(el("p",{style:{fontSize:13,color:"#666",marginBottom:12}},["Mark days you think you ovulated."]));
    const ovInp=el("input",{type:"date",value:TODAY});
    const ovBtn=btn("+ Log","","btn primary");
    ovBtn.addEventListener("click",()=>{
      if(ovInp.value&&!(cycle.ovulationDates||[]).includes(ovInp.value)){state.cycle.ovulationDates=[...(cycle.ovulationDates||[]),ovInp.value];save();render();}
    });
    card.appendChild(el("div",{class:"row",style:{marginBottom:12}},[ovInp,ovBtn]));
    (cycle.ovulationDates||[]).sort((a,b)=>b>a?1:-1).slice(0,6).forEach(d=>{
      const row=el("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 0",borderBottom:"0.5px solid rgba(0,0,0,0.08)"}});
      row.appendChild(el("span",{style:{fontSize:14}},[d]));
      const del=btn("x","","btn danger small");del.addEventListener("click",()=>{state.cycle.ovulationDates=state.cycle.ovulationDates.filter(x=>x!==d);save();render();});
      row.appendChild(del);card.appendChild(row);
    });
    div.appendChild(card);
  }

  else if(cycleSection==="symptoms"){
    const card=el("div",{class:"card"});card.appendChild(cardTitle("ti-stethoscope","Log Symptoms"));
    const dateInp=el("input",{type:"date",value:TODAY});
    card.appendChild(el("div",{style:{marginBottom:10}},[el("p",{style:{fontSize:12,color:"#666",marginBottom:4}},["Date"]),dateInp]));
    let checked=[...(cycle.symptoms&&cycle.symptoms[TODAY]&&cycle.symptoms[TODAY].checklist||[])];
    // Update checked when date changes
    dateInp.addEventListener("change",()=>{
      const existing=(cycle.symptoms&&cycle.symptoms[dateInp.value]&&cycle.symptoms[dateInp.value].checklist)||[];
      checked.length=0;existing.forEach(s=>checked.push(s));
      chipDiv.querySelectorAll(".chip").forEach(chip=>{
        const isActive=checked.includes(chip.textContent);
        chip.classList.toggle("active",isActive);
      });
    });
    card.appendChild(el("p",{style:{fontSize:13,fontWeight:500,marginBottom:8}},["Symptoms:"]));
    const chipDiv=el("div",{style:{display:"flex",flexWrap:"wrap",gap:6,marginBottom:12}});
    SYMPTOM_LIST.forEach(sym=>{
      const c=el("button",{class:"chip"+(checked.includes(sym)?" active":"")},[ sym]);
      c.addEventListener("click",()=>{if(checked.includes(sym))checked=checked.filter(x=>x!==sym);else checked.push(sym);c.classList.toggle("active",checked.includes(sym));});
      chipDiv.appendChild(c);
    });
    card.appendChild(chipDiv);
    const notesTA=el("textarea",{placeholder:"Any other observations...",rows:3,style:{width:"100%",resize:"vertical",boxSizing:"border-box",marginBottom:10}});
    if(cycle.symptoms&&cycle.symptoms[TODAY]) notesTA.value=cycle.symptoms[TODAY].notes||"";
    card.appendChild(notesTA);
    const saveBtn=btn("Save symptoms","","btn primary");
    const saveMsg=el("span",{style:{fontSize:13,color:"#1D9E75",marginLeft:10,display:"none"}},["Saved!"]);
    saveBtn.addEventListener("click",()=>{
      if(!state.cycle.symptoms)state.cycle.symptoms={};
      state.cycle.symptoms[dateInp.value]={checklist:[...checked],notes:notesTA.value};
      save();
      saveMsg.style.display="inline";
      setTimeout(()=>{saveMsg.style.display="none";},2000);
    });
    card.appendChild(el("div",{style:{display:"flex",alignItems:"center",marginBottom:8}},[saveBtn,saveMsg]));
    div.appendChild(card);
  }

  else if(cycleSection==="history"){
    const card=el("div",{class:"card"});card.appendChild(cardTitle("ti-history","Period History"));
    const dates=(cycle.periodDates||[]).sort((a,b)=>b.start>a.start?1:-1);
    if(!dates.length){card.appendChild(el("p",{style:{fontSize:13,color:"#666"}},["No periods logged yet."]));}
    else dates.forEach((p,i,arr)=>{
      const dur=p.end?Math.floor((new Date(p.end)-new Date(p.start))/86400000)+1:null;
      const nxt=arr[i+1]?.start;const cLen=nxt?Math.floor((new Date(p.start)-new Date(nxt))/86400000):null;
      const row=el("div",{style:{padding:"10px 0",borderBottom:i<arr.length-1?"0.5px solid rgba(0,0,0,0.08)":"none"}});
      const inner=el("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}});
      inner.appendChild(el("div",[el("p",{style:{fontSize:14,fontWeight:500}},[p.start+(p.end?" to "+p.end:"")]),el("p",{style:{fontSize:12,color:"#666"}},[(dur?dur+" days":"End not logged")+(cLen?" · Cycle: "+cLen+" days":"")])]));
      const del=btn("x","","btn danger small");
      del.addEventListener("click",()=>{state.cycle.periodDates=state.cycle.periodDates.filter((_,j)=>j!==arr.length-1-i);save();render();});
      inner.appendChild(del);row.appendChild(inner);card.appendChild(row);
    });
    div.appendChild(card);
  }
  return div;
}

render();
